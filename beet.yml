name: Beet Datapack Template
version: 0.1.0

pipeline:
  - beet.contrib.render
# - src.plugins.example_plugin

meta:
  render:
    data_pack:
      - "**"
  beet_datapack_template:
    base_version: "1.20"
    overlay_versions:
      v1_21: "1.21"

data_pack:
  load: src/datapack
  description: {"text":"Beet Datapack Template\n1.20 - 1.21.11", "color":"gray"}
  pack_format: 15
  min_format: 15
  max_format: 94
  supported_formats:
    min_inclusive: 15
    max_inclusive: 94
  overlays:
    - directory: v1_21
      min_format: 48
      max_format: 94
      formats:
        min_inclusive: 48
        max_inclusive: 94

resource_pack:
  description: Beet resourcepack template
  min_format: 15
  max_format: 75
  load: src/resourcepack

output: build
