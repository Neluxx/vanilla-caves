name: Build & Release Datapack

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Build standard datapack
        run: uvx beet build

      - name: Build legacy datapack
        run: uvx beet -p beet.legacy.yml build

      - name: Get release info
        id: info
        run: |
          read PROJECT VERSION <<< $(python3 -c "import yaml; d=yaml.safe_load(open('beet.yml')); print(d['name'].lower().replace(' ','_'), d['version'])")
          echo "project=$PROJECT" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "repo=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT

      - name: Package release artifacts
        run: |
          cd build/${{ steps.info.outputs.project }}_${{ steps.info.outputs.version }}_data_pack
          zip -r "../../${{ steps.info.outputs.repo }}.zip" .
          cd ../${{ steps.info.outputs.project }}_legacy_${{ steps.info.outputs.version }}_data_pack
          zip -r "../../${{ steps.info.outputs.repo }}_legacy.zip" .

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: false
          body: | 
            ## Installation
      
            - Download the datapack from the assets section
            - Move the datapack inside `.minecraft/saves/<world>/datapacks` ([How to find .minecraft?](https://minecraft.wiki/w/.minecraft#Locating))
            - Reload the world or run `/reload`
            
            ## Legacy Datapack

            This release includes two datapack variants:
            
            - **Standard datapack** → for Minecraft versions **1.21.9 and newer**
            - **Legacy datapack** → for Minecraft versions **below 1.21.9**
            
            Please ensure you download the correct version for your game, as using the wrong datapack may result in errors or missing functionality.
      
            ## Support the Project
      
            If you enjoy this datapack and find it useful, please consider giving the repository a star and following me on GitHub.  
            This helps the project gain visibility and motivates further development and maintenance.
          files: |
            ${{ steps.info.outputs.repo }}.zip
            ${{ steps.info.outputs.repo }}_legacy.zip
          fail_on_unmatched_files: true
